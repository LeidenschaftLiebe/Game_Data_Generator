game_id: Game_Fig_3_V154_Reasoning_about_your_own_future_mistakes
source: Reasoning about your own future mistakes, Games and Economic Behavior, Volume 154, Figure 3
extraction_methodology: Manual
description: |-
  Player 1 moves first and chooses between a and b.
  If Player 1 chooses a, Player 1 moves again and chooses between c and d.
  If Player 1 chooses c, Player 1 then chooses between e and f.
  If Player 1 chooses e, both players get 0.
  If Player 1 chooses f, the move passes to Player 2.
  If Player 1 chooses d instead, the move also passes to Player 2.
  If Player 1 chooses b at the start, the move again passes to Player 2.

  When Player 2 moves, Player 2 chooses between g, h, and i, but cannot tell which of those three situations has been reached.
  After the path a then c then f, Player 2 choosing g gives both players 1, choosing h gives 1 to Player 1 and 0 to Player 2, and choosing i gives 1 to Player 1 and -1 to Player 2.
  After the path a then d, Player 2 choosing g gives 1 to Player 1 and 0 to Player 2, choosing h gives both players 1, and choosing i gives 1 to Player 1 and -1 to Player 2.
  After the path b, Player 2 choosing g gives both players 1, choosing h gives 1 to Player 1 and 0 to Player 2, and choosing i gives 0 to Player 1 and -1 to Player 2.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
