game_id: Game_Fig_5_V78_A_dynamic_epistemic_characterization_of_backward_induction_without_counterfactuals
source: A dynamic epistemic characterization of backward induction without counterfactuals, Games and Economic Behavior, Volume 78, Figure 5
extraction_methodology: Manual
description: |-
  There are three players.
  Player 1 moves first and chooses between a1 and b1.

  If Player 1 chooses b1, the game ends immediately with reward 2 to Player 1, reward 2 to Player 2, and reward 0 to Player 3.

  If Player 1 chooses a1, Player 2 moves next and chooses between a2 and b2.

  If Player 2 chooses a2, Player 3 then chooses between a3 and b3.
  If the path is a1, a2, a3, the outcome gives reward 1 to Player 1, reward 1 to Player 2, and reward 0 to Player 3.
  If the path is a1, a2, b3, the outcome gives reward 3 to Player 1, reward 3 to Player 2, and reward 1 to Player 3.

  If Player 2 chooses b2, Player 3 then chooses between c3 and d3.
  If the path is a1, b2, c3, the outcome gives reward 1 to Player 1, reward 2 to Player 2, and reward 1 to Player 3.
  If the path is a1, b2, d3, the outcome gives reward 4 to Player 1, reward 0 to Player 2, and reward 0 to Player 3.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
