game_id: Game_Figure_Page_64_Exercise_6
source: 'Watson, J., 2002. Strategy: An introduction to game theory. Page 64, Exercise 6'
extraction_methodology: Manual
description: |-
  Player 1 moves first and chooses between action A, action B, and action C.
  If Player 1 chooses action C, the game ends immediately with a final reward of 1 for Player 1 and 1 for Player 2.

  If Player 1 chooses action A, then Player 2 chooses between action X and action Y.
  If Player 2 chooses action X after A, the final reward is 3 for Player 1 and 0 for Player 2.
  If Player 2 chooses action Y after A, the final reward is 0 for Player 1 and 3 for Player 2.

  If Player 1 chooses action B, then Player 2 again chooses between action X and action Y.
  When Player 2 makes that choice, Player 2 cannot tell whether the game reached this point after action A or after action B.
  If Player 2 chooses action X after B, the final reward is 0 for Player 1 and 3 for Player 2.
  If Player 2 chooses action Y after B, the final reward is 3 for Player 1 and 0 for Player 2.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
