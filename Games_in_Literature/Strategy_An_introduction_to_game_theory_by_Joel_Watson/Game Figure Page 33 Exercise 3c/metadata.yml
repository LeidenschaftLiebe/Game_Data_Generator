game_id: Game_Figure_Page_33_Exercise_3c
source: 'Watson, J., 2013. Strategy: An introduction to game theory. Page 33 Exercise_3c'
extraction_methodology: Manual
description: |-
  Player 1 moves first and chooses between action U and action D.
  If Player 1 chooses action U, then Player 2 chooses between action A and action B.
  If Player 2 chooses action A, the final result is 3 for Player 1 and 3 for Player 2.
  If Player 2 chooses action B, the final result is 5 for Player 1 and 4 for Player 2.

  If Player 1 chooses action D, then Player 2 chooses between action C and action D.
  If Player 2 chooses action D there, the final result is 2 for Player 1 and 2 for Player 2.
  If Player 2 chooses action C, then Player 1 moves again and chooses between action E and action F.
  If Player 1 chooses action E, the final result is 6 for Player 1 and 2 for Player 2.
  If Player 1 chooses action F, the final result is 2 for Player 1 and 6 for Player 2.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
