game_id: Game_Figure_Page_441_Exercise_5
source: 'Watson, J., 2013. Strategy: An introduction to game theory. Page 441, Exercise 5'
extraction_methodology: Manual
description: |-
  There are three people: Amy, Bart,and Chris. Amy and Bart have hats. 

  Amy moves first and decides whether to put her hat on her head or on the floor.
  Bart sees what Amy does. After that, Bart decides whether to put his own hat on his head or on the floor.

  If Bart puts his hat on his head, the game ends immediately and everyone gets 0.
  If Bart puts his hat on the floor, then Chris has to guess whether Amy’s hat is on her head.
  Chris can say yes or no. Chris sees what Bart did, but he does not see what Amy did.

  If Amy put her hat on her head and Chris says yes, then Chris is correct.
  The final reward is -1 for Amy, 0 for Bart, and 1 for Chris.
  If Amy put her hat on her head and Chris says no, then Chris is wrong.
  The final reward is 1 for Amy, 0 for Bart, and -1 for Chris.

  If Amy put her hat on the floor and Chris says yes, then Chris is wrong.
  The final reward is 1 for Amy, 0 for Bart, and -1 for Chris.
  If Amy put her hat on the floor and Chris says no, then Chris is correct.
  The final reward is -1 for Amy, 0 for Bart, and 1 for Chris.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
