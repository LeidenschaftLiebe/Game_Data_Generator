game_id: Game_Fig_1_V124_Backward_induction_in_games_without_perfect_recall
source: Backward induction in games without perfect recall, Games and Economic Behavior, Volume 124, Figure 1
extraction_methodology: Manual
description: |-
  Nature first chooses which side of the tree is used, with probability 1/2 for each side.

  On the left side, Player 2 moves first.
  Player 2 chooses between OUT and IN.

  If Player 2 chooses OUT, the game ends there.
  This gives Player 1 a reward of 1, and Player 2 a loss of 1.

  If Player 2 chooses IN, then Player 1 moves at the upper node and chooses between S and D.
  If Player 1 chooses S, this gives Player 1 a loss of 2, and Player 2 a reward of 2.
  If Player 1 chooses D, this gives Player 1 a reward of 2, and Player 2 a loss of 2.

  On the right side, Player 1 moves first.
  Player 1 chooses between Out and In.

  If Player 1 chooses Out, the game ends there.
  This gives Player 1 a loss of 1, and Player 2 a reward of 1.

  If Player 1 chooses In, then Player 1 moves again at the upper node and chooses between S and D.
  If Player 1 chooses S, this gives Player 1 a reward of 2, and Player 2 a loss of 2.
  If Player 1 chooses D, this gives Player 1 a loss of 2, and Player 2 a reward of 2.

  The two upper Player 1 nodes are linked.
  So when Player 1 makes that upper choice between S and D, 
  Player 1 cannot tell whether the path came from the left side after Player 2 chose IN, 
  or from the right side after Player 1 earlier chose In.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
additional_comments: This figure comes from the paper as a small example where one player later has to act again without being able to tell exactly how that point was reached. The article uses it to show why standard backward-induction style reasoning becomes tricky in such settings.
