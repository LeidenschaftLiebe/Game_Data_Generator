game_id: Game_Fig_3_V124_Backward_induction_in_games_without_perfect_recall
source: Backward induction in games without perfect recall, Games and Economic Behavior, Volume 124, Figure 3
extraction_methodology: Manual
description: |-
  Player 1 moves first and chooses between T and B.

  If Player 1 chooses T, the game ends immediately.
  This gives 2 to Player 1, and 6 to Player 2.

  If Player 1 chooses B, then Player 2 moves and chooses between U and D.

  If Player 2 chooses U, Player 2 then moves again chooses between L and R.
  If Player 2 chooses L, this gives 4 to Player 1, and 4 to Player 2.
  If Player 2 chooses R, this gives 0 to Player 1, and 0 to Player 2.

  If Player 2 chooses D, Player 2 then moves and chooses between L and R.
  If Player 2 chooses L, this gives 0 to Player 1, and 0 to Player 2.
  If Player 2 chooses R, this gives 1 to Player 1, and 1 to Player 2.

  When Player 2 chooses between L and R, Player 2 cannot tell whether the earlier move was U or D.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
