game_id: Game_Figure_Page_335_Exercise_5b
source: 'Watson, J., 2013. Strategy: An introduction to game theory. Game_Figure_Page_335_Exercise_5b'
extraction_methodology: Manual
description: |-
  Chance selects Microsoft's type as a Friend or Enemy, with probability 0.5 each.
  Microsoft knows its own type. 

  Then Microsoft chooses whether to Buy more Celera stock or Sell what it is holding.
  Celera only observes Microsoft's choice of Buy or Sell, but does not know Microsoft's type.
  Lastly, Celera chooses whether to Reveal or Hide its trade secrets.

  If Microsoft is a Friend and chooses to Buy Stock:
  When Celera reveals the trade secrets, the final reward is 15 for Microsoft and 12 for Celera.
  When Celera hides the trade secrets, the final reward is -1 for Microsoft and 1 for Celera.

  If Microsoft is Friend and chooses to Sell Stock:
  When Celera reveals the trade secrets, the final reward is 5 for Microsoft and 6 for Celera.
  When Celera hides the trade secrets, the final reward is 5 for Microsoft and -1 for Celera.

  If Microsoft is Enemy and chooses to Buy Stock:
  When Celera reveals the trade secrets, the final reward is 5 for Microsoft and -6 for Celera.
  When Celera hides the trade secrets, the final reward is 5 for Microsoft and 1 for Celera.

  If Microsoft is Enemy and chooses to Sell Stock:
  When Celera reveals the trade secrets, the final reward is 15 for Microsoft and -14 for Celera.
  When Celera hides the trade secrets, the final reward is 0 for Microsoft and -1 for Celera.
strategic_equivalence_notion: Strong VNM Equivalence
constraint_descriptions:
- Payoffs are stated explicitly, strong VNM is used and one payoff constraint is needed for seeding non-zero payoff for each player.
